---
- name: Configure Nginx Load Balancer
  hosts: loadbalancer
  become: true

  tasks:

    - name: Install Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Deploy Nginx load balancer configuration
      template:
        src: ../templates/nginx-lb.conf.j2
        dest: /etc/nginx/sites-available/loadbalancer.conf
        mode: '0644'

    - name: Enable load balancer site
      file:
        src: /etc/nginx/sites-available/loadbalancer.conf
        dest: /etc/nginx/sites-enabled/loadbalancer.conf
        state: link

    - name: Remove default Nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Test Nginx configuration
      command: nginx -t

    - name: Restart Nginx
      systemd:
        name: nginx
        state: restarted
        enabled: yes

all:
  children:
    loadbalancer:
      hosts:
        lb-01:
          ansible_host: 4.194.20.61
      vars:
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no'

    frontend_workers:
      hosts:
        frontend-01:
          ansible_host: 10.0.1.8
        frontend-02:
          ansible_host: 10.0.1.7
      vars:
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o ProxyJump=azureuser@4.194.20.61'

    backend_workers:
      hosts:
        backend-01:
          ansible_host: 10.0.1.4
        backend-02:
          ansible_host: 10.0.1.6
      vars:
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o ProxyJump=azureuser@4.194.20.61'

    workers:
      children:
        frontend_workers:
        backend_workers:

  vars:
    ansible_user: azureuser
    ansible_ssh_private_key_file: ~/.ssh/id_rsa

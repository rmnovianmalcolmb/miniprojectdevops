services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production

    image: concert-frontend:latest
    container_name: frontend-app

    ports:
      - "8080:8080"

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    networks:
      - concert-network


networks:
  concert-network:
    driver: bridge